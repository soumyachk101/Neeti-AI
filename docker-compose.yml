# Minimal: Redis + Ollama + Postgres via Docker
# Backend (FastAPI) and Frontend (Vite) run locally on your machine

services:
  db:
    image: postgres:15-alpine
    container_name: neeti_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=interview_user
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=interview_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_user -d interview_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neeti_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: neeti_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0

volumes:
  redis_data:
  ollama_data:
  postgres_data:
